name: Build CLI

on:
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
  workflow_dispatch:
    inputs:
      create_release:
        description: Create a GitHub release
        type: boolean
        default: false

env:
  BINARY_NAME: idevice_pair
  CARGO_TERM_COLOR: always

jobs:
  build-linux-static:
    name: Build Static Linux ARM64 (Termux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: static-aarch64-musl-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Static Binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --bin ${{ env.BINARY_NAME }} --target aarch64-unknown-linux-musl

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/aarch64-unknown-linux-musl/release/${{ env.BINARY_NAME }} dist/${{ env.BINARY_NAME }}-termux-arm64
          cd dist && tar -czvf ../${{ env.BINARY_NAME }}-termux-arm64.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-termux-arm64
          path: ${{ env.BINARY_NAME }}-termux-arm64.tar.gz

  build-other-platforms:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            arch: universal
            target: universal

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        if: matrix.target != 'universal'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build (Linux/Windows)
        if: matrix.target != 'universal'
        run: cargo build --release --bin ${{ env.BINARY_NAME }} --target ${{ matrix.target }}

      - name: Build (macOS Universal)
        if: matrix.target == 'universal'
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin
          cargo build --release --bin ${{ env.BINARY_NAME }} --target x86_64-apple-darwin
          cargo build --release --bin ${{ env.BINARY_NAME }} --target aarch64-apple-darwin
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/${{ env.BINARY_NAME }} \
            target/aarch64-apple-darwin/release/${{ env.BINARY_NAME }} \
            -output dist/${{ env.BINARY_NAME }}-macos-universal

      - name: Prepare artifact (Linux/Windows)
        if: matrix.target != 'universal'
        shell: bash
        run: |
          mkdir -p dist
          EXT=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then EXT=".exe"; fi
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${EXT} dist/${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}${EXT}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: Release
    needs: [build-linux-static, build-other-platforms]
    if: startsWith(github.ref, 'refs/tags/') || inputs.create_release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
